name: CI/CD Pipeline with Render

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'

jobs:
  test:
    name: 🧪 Tests and Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: 🔍 Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: 🎨 Format check with black
        run: black --check .
      
      - name: 🧪 Run tests with coverage
        run: |
          PYTHONPATH="${PYTHONPATH}:${PWD}" pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html
      
      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
      
      - name: ✅ Check test results
        if: success()
        run: echo "🎉 All tests passed successfully!"
      
      - name: ❌ Report test failure
        if: failure()
        run: echo "❌ Some tests failed! Check the logs."

  deploy-staging:
    name: 🚀 Deploy to Render Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🚀 Deploy to Render (Staging)
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys"
      
      - name: ✅ Verify Staging deployment
        run: |
          echo "✅ Deployment to staging initiated!"
          echo "🔗 Staging URL: https://calculadorapy-staging.onrender.com"

  deploy-production:
    name: 🚀 Deploy to Render Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🚀 Deploy to Render (Production)
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys"
      
      - name: ✅ Verify Production deployment
        run: |
          echo "✅ Deployment to production initiated!"
          echo "🔗 Production URL: https://calculadorapy.onrender.com"
      
      - name: 🔔 Notify deployment success
        if: success()
        run: |
          echo "🎉 Deployment to production successful!"
          echo "📊 Service is live at: https://calculadorapy.onrender.com"
      
      - name: 🔔 Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment to production failed!"
          echo "🔍 Check Render logs for details."