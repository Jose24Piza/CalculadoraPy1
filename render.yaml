# render.yaml - Configuración para Render

services:
  # Servicio de Staging (Desarrollo)
  - type: web
    name: calculadorapy-staging
    runtime: python
    repo: https://github.com/Jose24Piza/CalculadoraPy
    branch: develop
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install pytest pytest-cov
    startCommand: gunicorn app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: staging
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
      - key: LOG_LEVEL
        value: DEBUG
    
    # Configuración de logs
    logging:
      - type: stream
        logs:
          - access
          - error
  
  # Servicio de Producción
  - type: web
    name: calculadorapy
    runtime: python
    repo: https://github.com/Jose24Piza/CalculadoraPy
    branch: main
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=2 --threads=4
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: true
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
    
    # Configuración de logs
    logging:
      - type: stream
        logs:
          - access
          - error
    
    # Configuración de recursos
    scaling:
      min: 1
      max: 1
    
    # Configuración de monitoreo
    monitoring:
      - type: health_check
        path: /health
        interval: 30s
        timeout: 5s
        retries: 3